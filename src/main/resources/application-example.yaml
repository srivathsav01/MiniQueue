server:
  port: 8080

miniqueue:
  redelivery:
    timeout-minutes: 1
    fixed-delay-ms: 60000
    max-retries: 3
spring:
  application:
    name: miniqueue
  datasource:
    url: jdbc:postgresql://localhost:5432/miniqueue
    username: postgres-username
    password: postgres-password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true